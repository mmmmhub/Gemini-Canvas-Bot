<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Canvas — AI Image Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">

    <!-- ── Header ────────────────────────────────────────────────── -->
    <header class="header">
      <div class="header-brand">
        <svg class="brand-icon" width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="7" fill="#4f46e5"/>
          <path d="M9 20L14 9L19 20M11 16.5H17" stroke="white" stroke-width="1.7"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="brand-name">Gemini Canvas</span>
      </div>
      <div class="server-status" id="serverStatus">
        <span class="status-dot" id="serverDot"></span>
        <span class="status-text" id="serverText">Connecting…</span>
      </div>
    </header>

    <main class="main">

      <!-- ── Generate Form ─────────────────────────────────────────── -->
      <section class="card" id="formCard">
        <h1 class="section-title">Generate an Image</h1>
        <p class="section-sub">Type a prompt in any language — Arabic and English both work.</p>

        <div class="field">
          <label class="field-label" for="promptInput">Prompt</label>
          <textarea
            id="promptInput"
            class="textarea"
            placeholder="مدينة مستقبلية في الفضاء · A futuristic city in outer space…"
            rows="4"
            spellcheck="false"
          ></textarea>
        </div>

        <div class="form-row">
          <div class="field field-narrow">
            <label class="field-label" for="countInput">Image Count</label>
            <input
              id="countInput"
              class="input"
              type="number"
              min="1"
              value="1"
            />
          </div>
          <button class="btn-primary" id="generateBtn" type="button">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M8 1.5L10 6.5H15L11 9.5L12.5 14.5L8 11.5L3.5 14.5L5 9.5L1 6.5H6L8 1.5Z"
                    stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
            </svg>
            <span id="btnText">Generate</span>
          </button>
        </div>
      </section>

      <!-- ── Job Status ─────────────────────────────────────────────── -->
      <section class="card card-status" id="statusCard" hidden>
        <div class="job-header">
          <div class="job-icon" id="jobIcon"></div>
          <div class="job-copy">
            <p class="job-title" id="jobTitle">Submitting…</p>
            <p class="job-desc"  id="jobDesc">Your request is on its way.</p>
          </div>
        </div>

        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="job-meta" id="jobMeta"></div>
      </section>

      <!-- ── Result ─────────────────────────────────────────────────── -->
      <section class="card card-result" id="resultCard" hidden>
        <p class="result-label">Generated Image</p>
        <div class="result-img-box">
          <img id="resultImg" class="result-img" src="" alt="Generated image" />
        </div>
        <a id="downloadBtn" class="btn-download" download="gemini-canvas.png">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
            <path d="M7.5 2V9.5M7.5 9.5L5 7M7.5 9.5L10 7" stroke="currentColor"
                  stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 12.5H13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          Download Image
        </a>
      </section>

    </main>
  </div>

  <script>
    window.APP_BASE = '/canvas-app';
  </script>
  <script src="app.js"></script>
</body>
</html>
